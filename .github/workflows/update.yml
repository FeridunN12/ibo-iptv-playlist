name: Update combined playlist

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Combine playlists
        run: |
          python combine.py
          cp docs/combined.m3u combined.m3u

      - name: Commit updated playlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/combined.m3u combined.m3u

          if git diff --cached --quiet; then
            echo "No playlist changes to commit."
          else
            git commit -m "Update combined IPTV playlist"
            git push
          fi
